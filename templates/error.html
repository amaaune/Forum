<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Erreur {{.Code}}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="page.error">
        <div class="card.error">
            <div class="code-badge.error">
                <span>{{.Code}}</span>
            </div>
            <p class="title.error">{{.Title}}</p>
            <p class="message.error">{{.Message}}</p>
            <a class="btn.error" href="/">
                ← Retour à l'accueil
            </a>
            <div class="divider.error"></div>
            <p class="hint.error">Si le problème persiste, contacte un administrateur.</p>
        </div>
    </div>
</body>
</html>
