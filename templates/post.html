<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Connexion Google</title>

<link rel="stylesheet" href="../static/css/post.css">

</head>
<body>
    <div class="page">
        <p class="page-title">Créer un post</p>

        <div class="post-card">
            <h2>Titre du post</h2>
            <form action="/post" method="post">
                <input type="text" name="post_name" placeholder="Entrez le titre de votre post" required>
                <button type="submit" class="btn btn-secondary">Enregistrer le titre</button>
            </form>
        </div>

        <div class="post-card">
            <h2>Contenu</h2>
            <form action="/post" method="post">
                <textarea name="post_content" placeholder="Qu'avez-vous à dire ?" required></textarea>
                <button type="submit" class="btn btn-secondary">Enregistrer le contenu</button>
            </form>
        </div>

        <div class="post-card">
            <h2>Catégories</h2>
            <form action="/post" method="post">
                <input type="text" name="post_categories" placeholder="Séparées par des virgules — ex: Go, Sécurité, Web" required>
                <button type="submit" class="btn btn-secondary">Ajouter les catégories</button>
            </form>
        </div>

        <div class="divider"></div>

        <div class="publish-bar">
            <span class="publish-hint">Vérifiez votre post avant de publier</span>
            <button type="submit" class="btn btn-primary">Publier le post</button>
        </div>
    </div>
</body>
</html>
