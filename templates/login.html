<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Connexion Google</title>

<link rel="stylesheet" href="../static/css/login.css">

</head>
<body>

    <button onclick="window.history.back()" class="button" aria-label="Retour">← </button>
    <a href="index.html" class="home-btn" aria-label="Retour à l'accueil">Accueil</a>

    <div class="login-container">
        <h2>Connexion</h2>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">Adresse mail</label>
                <input type="email" id="email" name="email" placeholder="Entrez votre email" required>
            </div>

            <div class="input-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="Entrez votre mot de passe" required>
            </div>

            <div id="messageBox" style="display: none; margin-bottom: 15px; padding: 10px; border-radius: 4px; text-align: center;"></div>

            <button type="submit" class="login-btn">
                Se connecter
            </button>

            <a href="register.html" class="forgot-btn" style="display: inline-block; text-align: center; text-decoration: none;">
                S'inscrire
            </a>
        </form>

    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageBox = document.getElementById('messageBox');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.success) {
                    messageBox.style.display = 'block';
                    messageBox.style.backgroundColor = '#d4edda';
                    messageBox.style.color = '#155724';
                    messageBox.textContent = data.message;
                    
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    messageBox.style.display = 'block';
                    messageBox.style.backgroundColor = '#f8d7da';
                    messageBox.style.color = '#721c24';
                    messageBox.textContent = data.message;
                }
            } catch (error) {
                messageBox.style.display = 'block';
                messageBox.style.backgroundColor = '#f8d7da';
                messageBox.style.color = '#721c24';
                messageBox.textContent = 'Erreur serveur: ' + error.message;
            }
        });
    </script>

</body>
</html>
