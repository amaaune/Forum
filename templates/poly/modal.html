{{define "modal"}}
<div id="createPostModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Créer une publication</h2>
      <button id="closeModalBtn" class="modal-close-btn">&times;</button>
    </div>

    <form
      action="/post/create"
      method="POST"
      class="modal-form"
      id="createPostForm"
    >
      <div class="form-group">
        <input
          type="text"
          name="title"
          placeholder="Titre de votre publication"
          required
          autocomplete="off"
        />
      </div>

      <div class="form-group">
        <textarea
          name="content"
          placeholder="Que voulez-vous dire ?"
          rows="6"
          required
        ></textarea>
      </div>

      <div class="form-group">
        <label
          class="form-label"
          style="
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #818384;
          "
        >
          Ajouter des catégories :
        </label>

        <input
          type="text"
          id="categorySearchInput"
          placeholder="Rechercher ou taper une catégorie... (ex: a/Golang)"
          autocomplete="off"
        />

        <datalist id="categoriesData">
          {{range .Categories}}
          <option value="a/{{.Name}}" data-id="{{.CategoryID}}"></option>
          {{end}}
        </datalist>

        <div id="selectedCategoriesBadges" class="badges-container"></div>
      </div>

      <div class="form-actions">
        <button type="button" id="cancelModalBtn" class="btn-secondary">
          Annuler
        </button>
        <button type="submit" class="btn-primary">Publier</button>
      </div>
    </form>
  </div>
</div>
{{end}}
